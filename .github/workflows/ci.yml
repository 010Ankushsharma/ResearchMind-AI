name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        working-directory: backend
        run: ruff check . --output-format=github
        continue-on-error: true # non-blocking for now — tighten once codebase stabilizes

      - name: Run tests
        working-directory: backend
        env:
          # Dummy values so app config loads without real secrets — the test
          # suite (tests/test_*.py) never touches a live DB/LLM/Chroma instance.
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
          CHROMA_HOST: "localhost"
          OPENROUTER_API_KEY: "test-key"
          GROQ_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          CLERK_SECRET_KEY: "test-key"
          CLERK_JWT_ISSUER: "https://test.clerk.accounts.dev"
          SECRET_KEY: "ci-test-secret"
        run: pytest --cov --cov-report=term-missing

  backend-integration:
    name: Backend (integration test, real Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration test against real Postgres
        working-directory: backend
        env:
          TEST_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5433/test_db"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5433/test_db"
          OPENROUTER_API_KEY: "test-key"
          GROQ_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          CLERK_SECRET_KEY: "test-key"
          CLERK_JWT_ISSUER: "https://test.clerk.accounts.dev"
          SECRET_KEY: "ci-test-secret"
        run: pytest tests/test_pipeline_integration.py -v

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
          CLERK_SECRET_KEY: "sk_test_placeholder"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build
