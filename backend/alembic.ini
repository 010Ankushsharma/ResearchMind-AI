; ──────────────────────────────────────────────────────────────────────────
; Alembic configuration — Multi-Agent Research & Report Generation Platform
;
; Note: sqlalchemy.url is intentionally left blank here. The actual URL is
; injected at runtime from `core.config.settings.DATABASE_URL` inside
; migrations/env.py, so there's a single source of truth (the .env file)
; instead of duplicating the connection string in two places.
; ──────────────────────────────────────────────────────────────────────────

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url =

# Use a single line per revision in the changelog
truncate_slug_length = 40

[post_write_hooks]
# Auto-format generated migration files with black, if installed.
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
